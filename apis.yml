description: >-
  Alere Inc. was a global manufacturer of rapid point-of-care diagnostic tests,
  founded in 1991 and headquartered in Waltham, Massachusetts. The company
  operated three business units focused on cardiometabolic, infectious disease,
  and toxicology testing. Alere's product portfolio included the Alere i
  platform for rapid molecular diagnostics, the Alere CD4 analyser for HIV
  management, and the RALS point-of-care data management system for laboratory
  connectivity. Alere Informatics offered web-based solutions including
  RALS-Freedom, AegisPOC, and RALS-Web3 for point-of-care device management and
  data integration with laboratory information systems. Abbott Laboratories
  acquired Alere on October 3, 2017 for $5.3 billion, and the company now
  operates as Abbott Rapid Diagnostics.
apis:
  - aid: alere:rals-api
    name: RALS Point-of-Care Data Management API
    description: >-
      The RALS (Remote Automated Laboratory Systems) platform provides
      point-of-care device management and data integration capabilities. RALS
      connects point-of-care testing devices to laboratory information systems
      (LIS) and electronic health records (EHR), enabling bidirectional data
      exchange for patient demographics, test results, and quality control data.
      The platform supports HL7 messaging standards for healthcare interoperability.
